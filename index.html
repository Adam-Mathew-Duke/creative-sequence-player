<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="#">
        
        <!-- Load CSS -->
        <link rel="stylesheet" href="../CSS/style.css"> 
        
        <!-- Only main.js is needed! It acts as the entry point and imports the other modules automatically -->
        <script type="module" src="../JS/main.js" defer></script>

        <!-- Webpage Title -->
        <title>Creative Sequence Player (Pre-Release)</title> 
    </head>
    
    <body>
        <!-- Header -->
        <h1>Creative Sequence Player (Pre-Release)</h1>

        <!-- Power Button -->
        <button id="startButton" class="mixerButton">POWER</button>    

        <!-- Mixer Container -->
        <div id="MixerContainer" class="MixerContainer hidden">

            <!-- Load Channel -->
            <div class="flex-header">
                <label class="mixer-labels">LOAD</label>
            </div>
            <div class="LoadContainer">
                <input type="file" class="loadFiles" id="loadFiles" multiple accept="audio/mp3,audio/wav">
            </div>
            
            <div class="flex-header">        
                <label class="mixer-labels">MASTER</label>
            </div>

            <!-- Master Channel -->
            <div class="flex-container">          
                <div class="flex-item">
                    <label class="mixer-labels">PLAYBACK</label>
                    <div class="horizontalButtons"> 
                        <button id="MasterPlayButton" class="mixerButton">PLAY STOP</button>
                    </div>
                    <button id="MasterRandomButton" class="mixerButton">RANDOM MIX</button>
                    <button id="MasterResetButton" class="mixerButton">RESET MIX</button>
                </div>
                
                <div class="flex-item">
                    <label class="mixer-labels">FADE IN</label>
                    <input type="range" min="0" max="10" value="0" step="5" class="SliderVertical" id="fade-slider">
                    <label id="fade-label">0 SEC</label>
                </div>
                
                <div class="flex-item">
                    <label class="mixer-labels">FADE OUT</label>
                    <input type="range" min="0" max="10" value="0" step="5" class="SliderVertical" id="fadeout-slider">
                    <label id="fadeout-label">0 SEC</label>
                </div>
                
                <div class="flex-item">
                    <label class="mixer-labels">LOW PASS</label>
                    <input type="range" id="MasterLowpassSlider" min="0" max="100" step="0.5" value="100" class="SliderVertical">
                    <label id="MasterLowpassSliderLabel">20000 Hz</label>
                </div>
                
                <div class="flex-item"> 
                    <label class="mixer-labels">LIMITER</label>
                    <input type="range" min="-24" max="-0.5" value="-0.5" step="0.1" class="SliderVertical" id="masterLimiterNodeSlider">
                    <label id="masterLimiterNodeSliderLabel">-0.5 dB</label>
                </div>
                
                <div class="flex-item"> 
                    <label class="mixer-labels">VOLUME</label>
                    <input type="range" min="0" max="100" value="100" step="1" class="SliderVertical" id="MasterVolumeSlider">
                    <label id="MasterVolumeLabel">100%</label>
                </div>
            </div>

            <!-- Mixer Tracks (Generated dynamically via JS) -->
            <div class="TrackContainer"></div>
        </div> 
    </body> 
</html>
